{% extends "base.html" %}

{% block content %}
  <div class="login-card forgot-password-card">
    <div class="info-box">
      <p>Insira seu login e e-mail para recuperar sua senha. Você será redirecionado para entrar em contato com o administrador.</p>
    </div>
    
    <form method="post" action="{{ url_for('forgot_password') }}">
      <label for="username">{{ t('username_label') }} (Login) *</label>
      <input id="username" name="username" type="text" required>

      <label for="email">{{ t('email_label') }} *</label>
      <input id="email" name="email" type="email" required>

      <button type="submit">Recuperar Senha</button>
    </form>
    
    <div class="login-footer">
      <p>
        <a href="{{ url_for('login') }}" class="back-link">
          ← Voltar para login
        </a>
      </p>
    </div>
  </div>

  <style>
    .forgot-password-card {
      max-width: 400px;
    }
    
    .info-box {
      background-color: #e7f3ff;
      border-left: 4px solid #007bff;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
      color: #004085;
    }
    
    .login-footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    
    .back-link {
      color: #007bff;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link:hover {
      text-decoration: underline;
      color: #0056b3;
    }
  </style>
{% endblock %}
