{% extends "base.html" %}

{% block content %}
  <div class="form-card sale-card">
    <div class="sale-header">
      <h2 class="sale-title">Nova Venda</h2>
      <button type="button" class="btn-add sale-add-btn" onclick="addSaleRow()">+ {{ t('add_item') }}</button>
    </div>

    <form method="post" action="{{ url_for('vendas') }}" id="sale-form">
      <div class="sale-items" id="sale-items">
        <div class="sale-row">
          <div class="field-group sale-field-product">
            <label>{{ t('product_label') }}</label>
            <div class="product-select-wrapper">
              <select name="product_id[]" class="product-select" required onchange="updatePrice(this)">
                <option value="">{{ t('select_product') }}</option>
                {% for product in products %}
                  <option value="{{ product['id'] }}" data-price="{{ product['price'] }}" data-cost="{{ product['cost'] }}" data-stock="{{ product['stock'] }}">{{ product['name'] }} ({{ product['stock'] }} {{ product['unit_name'] }})</option>
                {% endfor %}
              </select>
              <span class="product-search-icon" aria-hidden="true">&#128269;</span>
            </div>
          </div>
          <div class="field-group sale-field-qty">
            <label>{{ t('quantity_label') }}</label>
            <input name="quantity[]" type="number" min="1" step="1" value="1" required oninput="updateLineTotal(this)">
          </div>
          <div class="field-group sale-field-price">
            <label>{{ t('unit_price') }}</label>
            <input name="unit_price[]" type="number" step="0.01" value="0.00" readonly>
          </div>
          <div class="field-group sale-field-total">
            <label>{{ t('line_total') }}</label>
            <input name="line_total[]" type="number" step="0.01" value="0.00" readonly>
          </div>
          <div class="field-group sale-field-del">
            <button type="button" class="btn-delete btn-icon-del" onclick="removeSaleRow(this)" title="{{ t('remove') }}">&#128465;</button>
          </div>
        </div>
      </div>

      <div class="sale-lower">
        <div class="sale-controls-row">
          <div class="field-group">
            <label>{{ t('discount_label') }}</label>
            <input name="discount" type="number" step="0.01" value="0.00" oninput="updateTotals()">
          </div>
          <div class="field-group">
            <label>{{ t('surcharge_label') }}</label>
            <input name="surcharge" type="number" step="0.01" value="0.00" oninput="updateTotals()">
          </div>
          <div class="field-group">
            <label>{{ t('payment_method') }}</label>
            <select name="payment_method" id="payment-method-select" onchange="onPaymentMethodChange(this.value)">
              <option value="Dinheiro">Dinheiro</option>
              <option value="Pix">Pix</option>
              <option value="Débito">Débito</option>
              <option value="Crédito">Crédito</option>
            </select>
          </div>
          <div id="installment-row" class="field-group" style="display:none">
            <label>Parcelas</label>
            <select name="installments" id="installments-select" onchange="applyCardSurcharge()">
              <option value="1">1x (à vista)</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="4">4x</option>
              <option value="5">5x</option>
              <option value="6">6x</option>
              <option value="7">7x</option>
              <option value="8">8x</option>
              <option value="9">9x</option>
              <option value="10">10x</option>
              <option value="11">11x</option>
              <option value="12">12x</option>
            </select>
          </div>
          <div id="payment-received-row" class="field-group">
            <label>{{ t('payment_received') }}</label>
            <input name="payment_received" type="number" step="0.01" value="0.00" oninput="updateTotals()">
          </div>
        </div>

        <div class="sale-client-summary">
          <div class="field-group sale-client-field">
            <label>{{ t('client_label') }}</label>
            <select name="client_id">
              <option value="">{{ t('no_client') }}</option>
              {% for client in clients %}
                <option value="{{ client['id'] }}">{{ client['name'] }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="totals-section">
            <div class="totals-row">
              <span>{{ t('total_label') }}:</span>
              <strong id="order-total">0,00</strong>
            </div>
            <div class="totals-row">
              <span>{{ t('cash_change') }}:</span>
              <strong id="order-change">0,00</strong>
            </div>
            <button type="submit" class="btn-confirm-sale">&#9432; {{ t('confirm_sale_button') }}</button>
          </div>
        </div>
      </div>
    </form>
  </div>

  {% if pix_code %}
    <div class="notice-card">
      <h3>{{ t('pix_code_title') }}</h3>
      <p>{{ pix_code }}</p>
    </div>
  {% endif %}

  <div class="manual-action">
    <a class="outline-button" href="{{ url_for('fechar_caixa') }}">{{ t('close_cash') }}</a>
  </div>

  <script>
    var CARD_SETTINGS = {{ card_settings_json|safe }};

    function formatCurrency(value) {
      return Number(value).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function formatNumber(value) {
      return Number(value).toFixed(2);
    }
    function getSubtotal() {
      let rows = document.querySelectorAll('.sale-row');
      let total = 0;
      rows.forEach(row => {
        let lineTotal = parseFloat(row.querySelector('input[name="line_total[]"]').value) || 0;
        total += lineTotal;
      });
      return total;
    }
    function applyCardSurcharge() {
      let method = document.getElementById('payment-method-select').value;
      let surchargeInput = document.querySelector('input[name="surcharge"]');
      let subtotal = getSubtotal();
      let discount = parseFloat(document.querySelector('input[name="discount"]').value) || 0;
      let base = subtotal - discount;

      if (method === 'Crédito' && CARD_SETTINGS.credit_enabled) {
        let installments = parseInt(document.getElementById('installments-select').value) || 1;
        let rate = parseFloat(CARD_SETTINGS.credit_rates[String(installments)]) || 0;
        surchargeInput.value = formatNumber(base * rate / 100);
      } else if (method === 'Débito' && CARD_SETTINGS.debit_enabled) {
        let rate = parseFloat(CARD_SETTINGS.debit_rate) || 0;
        surchargeInput.value = formatNumber(base * rate / 100);
      } else {
        surchargeInput.value = '0.00';
      }
      updateTotals();
    }
    function onPaymentMethodChange(method) {
      let installmentRow = document.getElementById('installment-row');
      let receivedRow = document.getElementById('payment-received-row');

      installmentRow.style.display = (method === 'Crédito') ? '' : 'none';
      if (receivedRow) {
        receivedRow.style.display = method === 'Dinheiro' ? '' : 'none';
      }
      applyCardSurcharge();
    }
    function updateTotals() {
      let subtotal = getSubtotal();
      let discount = parseFloat(document.querySelector('input[name="discount"]').value) || 0;
      let surcharge = parseFloat(document.querySelector('input[name="surcharge"]').value) || 0;
      let orderTotal = subtotal - discount + surcharge;
      document.getElementById('order-total').innerText = 'R$ ' + formatCurrency(orderTotal);
      updateChange(orderTotal);
    }
    function updatePrice(select) {
      let option = select.options[select.selectedIndex];
      let price = parseFloat(option.dataset.price || 0);
      let row = select.closest('.sale-row');
      row.querySelector('input[name="unit_price[]"]').value = formatNumber(price);
      updateLineTotal(row.querySelector('input[name="quantity[]"]'));
    }
    function updateLineTotal(quantityInput) {
      let row = quantityInput.closest('.sale-row');
      let quantity = parseFloat(quantityInput.value) || 0;
      let price = parseFloat(row.querySelector('input[name="unit_price[]"]').value) || 0;
      row.querySelector('input[name="line_total[]"]').value = formatNumber(quantity * price);
      applyCardSurcharge();
    }
    function buildSaleRow() {
      let first = document.querySelector('.sale-row');
      let template = first.cloneNode(true);
      template.querySelectorAll('input').forEach(input => {
        if (input.type !== 'hidden') input.value = input.name === 'quantity[]' ? '1' : '0.00';
      });
      template.querySelector('select.product-select').selectedIndex = 0;
      return template;
    }
    function addSaleRow() {
      let container = document.getElementById('sale-items');
      let newRow = buildSaleRow();
      newRow.querySelectorAll('input[name="unit_price[]"], input[name="line_total[]"]').forEach(i => i.value = '0.00');
      container.appendChild(newRow);
      updateTotals();
    }
    function removeSaleRow(button) {
      let container = document.getElementById('sale-items');
      if (container.querySelectorAll('.sale-row').length > 1) {
        button.closest('.sale-row').remove();
        applyCardSurcharge();
      }
    }
    function updateChange(orderTotal) {
      let method = document.getElementById('payment-method-select').value;
      let received = parseFloat(document.querySelector('input[name="payment_received"]').value) || 0;
      let change = method === 'Dinheiro' ? Math.max(received - orderTotal, 0) : 0;
      document.getElementById('order-change').innerText = 'R$ ' + formatCurrency(change);
    }
    document.addEventListener('input', function(event) {
      if (event.target.matches('input[name="payment_received"], input[name="discount"], input[name="quantity[]"]')) {
        if (event.target.matches('input[name="discount"]')) {
          applyCardSurcharge();
        } else {
          updateTotals();
        }
      }
      if (event.target.matches('input[name="surcharge"]')) {
        updateTotals();
      }
    });
    document.addEventListener('change', function(event) {
      if (event.target.matches('select[name="product_id[]"]')) {
        updateTotals();
      }
    });
    onPaymentMethodChange(document.getElementById('payment-method-select').value);
  </script>
{% endblock %}
