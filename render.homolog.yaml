databases:
  - name: mini-erp-homolog-db
    plan: free

services:
  - type: web
    name: mini-erp-homolog
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn_config.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-erp-homolog-db
          property: connectionString
      - key: APP_ENV
        value: homolog
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
